server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/online_exam_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    # Secret key should be a base64 encoded string of at least 256 bits (32 bytes)
    secret: dGhlLXN1cGVyLXNlY3JldC1rZXktZm9yLW9ubGluZS1leGFtLW1hbmFnZW1lbnQtc3lzdGVtLXByb2R1Y3Rpb24tZGVwbG95bWVudC1rZXk=
    expiration-ms: 86400000        # 24 Hours
    refresh-expiration-ms: 604800000 # 7 Days
